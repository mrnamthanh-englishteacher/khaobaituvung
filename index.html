<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✨ KHẢO BÀI TỪ VỰNG ✨</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#ffe6f0,#e0f7fa);
  margin:0;padding:0;
}

.container{
  max-width:900px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  color:#ff4da6;
}

.header{
  text-align:center;
  margin-bottom:15px;
}

#username{
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
  width:60%;
  text-align:center;
}

#timer{
  text-align:center;
  font-size:18px;
  margin:10px;
}

.question{
  background:#f9f9f9;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
}

.unanswered{
  border:2px solid red;
  background:#fff0f0;
}

.answers label{
  display:block;
  margin:5px 0;
  cursor:pointer;
}

button{
  display:block;
  margin:20px auto;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff4da6;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

#result{
  margin-top:20px;
}

#leaderboard{
  margin-top:10px;
}
</style>
</head>

<body oncontextmenu="return false;">

<div class="container">

<h1>✨ KHẢO BÀI TỪ VỰNG EXTRA READING (LẦN 2) ✨</h1>

<div class="header">
<input id="username" placeholder="Nhập tên của bạn...">
</div>

<div id="timer">⏳ 15:00</div>

<div id="quiz"></div>

<button onclick="submitQuiz()">Nộp bài</button>

<div id="result"></div>

<h3>🏆 Bảng xếp hạng</h3>
<div id="leaderboard"></div>

</div>

<script>
let tabSwitchCount = 0; 

document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    tabSwitchCount++;

    alert("⚠️ Bạn đã rời tab (" + tabSwitchCount + " lần)");

    if(tabSwitchCount >= 3){
      alert("❌ Bạn rời tab quá nhiều!");
      submitQuiz();
    }
  }
});

// 🔀 random
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// 📚 DATA
let originalQuestions = [ 
{
  q: "Every guest staying at the hotel is offered a ______ breakfast at no extra cost.",
  a: ["complementary", "complimentary", "compliment", "complement"],
  c: 1
},
{
  q: "Air is ______ for human survival. Without it, we cannot live.",
  a: ["superficial", "indispensable", "impulsive", "elaborate"],
  c: 1
},
{
  q: "The teacher gave Jenny a ______ for her excellent presentation in front of the class.",
  a: ["complement", "compliment", "complementary", "gratitude"],
  c: 1
},
{
  q: "You shouldn't eat too much ______ because it increases the risk of heart disease.",
  a: ["refined sugar", "saturated fat", "perseverance", "novelty"],
  c: 1
},
{
  q: "Success is impossible without ______. No matter how talented you are, you must keep trying.",
  a: ["novelty", "perseverance", "gratification", "discernment"],
  c: 1
},
{
  q: "The final football match became extremely ______ after both teams scored in the last five minutes.",
  a: ["superficial", "intense", "holistic", "delayed"],
  c: 1
},
{
  q: "Strong winds are expected to ______ the wildfire throughout the national park.",
  a: ["articulate", "intensify", "resonate", "designate"],
  c: 1
},
{
  q: "Many people ______ challenges because they believe difficulties help them grow.",
  a: ["embrace", "vacate", "savor", "dictate"],
  c: 0
},
{
  q: "Before publishing the article, the editor carefully ______ every detail for possible mistakes.",
  a: ["embraced", "scrutinized", "savored", "designated"],
  c: 1
},
{
  q: "The professor was able to ______ difficult scientific concepts in a way that everyone could understand.",
  a: ["dictate", "articulate", "cultivate", "vacate"],
  c: 1
},
{
  q: "There are currently three job ______ in our sales department.",
  a: ["novelties", "vacancies", "gratifications", "complements"],
  c: 1
},
{
  q: "Her encouraging words ______ me to apply for an overseas scholarship.",
  a: ["prompted", "resonated", "vacated", "embraced"],
  c: 0
},
{
  q: "The government ______ the importance of renewable energy in its latest report.",
  a: ["savored", "underscored", "accumulated", "complimented"],
  c: 1
},
{
  q: "After years of research, the scientist decided to ______ a completely new project.",
  a: ["undertake", "indulge", "dictate", "mistake"],
  c: 0
},
{
  q: "Her creativity and leadership skills ______ her ______ the other candidates.",
  a: ["mistook / for", "set / apart from", "prompted / to", "resonated / with"],
  c: 1
},
{
  q: 'The word "indispensable" is closest in meaning to ______.',
  a: ["không thể thiếu", "hời hợt", "độc quyền", "trì hoãn"],
  c: 0
},
{
  q: 'The word "superficial" is closest in meaning to ______.',
  a: ["toàn diện", "hời hợt", "vô giá", "kiên trì"],
  c: 1
},
{
  q: 'The word "holistic" is closest in meaning to ______.',
  a: ["toàn diện", "bốc đồng", "miễn phí", "chính xác"],
  c: 0
},
{
  q: 'The word "valuable" is closest in meaning to ______.',
  a: ["vô giá", "có giá trị", "miễn phí", "được chỉ định"],
  c: 1
},
{
  q: 'The words "invaluable / priceless" are closest in meaning to ______.',
  a: ["có giá trị", "vô giá", "không đáng giá", "miễn phí"],
  c: 1
},
{
  q: 'The word "gratification" is closest in meaning to ______.',
  a: ["sự trì hoãn", "sự hài lòng, thỏa mãn", "sự sáng suốt", "sự bổ sung"],
  c: 1
},
{
  q: 'The word "discernment" is closest in meaning to ______.',
  a: ["sự sáng suốt", "sự đổi mới", "sự kiên trì", "sự miễn phí"],
  c: 0
},
{
  q: 'The word "novelty" is closest in meaning to ______.',
  a: ["sự đổi mới", "sự trì hoãn", "lời khen", "phần bổ sung"],
  c: 0
},
{
  q: 'The word "designate" is closest in meaning to ______.',
  a: ["chỉ định", "kiểm tra kỹ", "nuôi dưỡng", "trì hoãn"],
  c: 0
},
{
  q: 'The word "vacated" is closest in meaning to ______.',
  a: ["được xây dựng", "rời bỏ (vị trí/toà nhà)", "được bổ nhiệm", "được khen"],
  c: 1
},
{
  q: 'The word "cultivate" is closest in meaning to ______.',
  a: ["loại bỏ", "nuôi dưỡng, trau dồi", "cộng hưởng", "tăng tốc"],
  c: 1
},
{
  q: 'The phrase "means of" is closest in meaning to ______.',
  a: ["kết quả của", "phương thức của", "nguyên nhân của", "ví dụ của"],
  c: 1
},
{
  q: 'The phrase "savor a cup of tea" is closest in meaning to ______.',
  a: ["pha trà", "nhâm nhi một tách trà", "mua trà", "rót trà"],
  c: 1
},
{
  q: 'The phrase "mistake A for B" is closest in meaning to ______.',
  a: ["thay thế A bằng B", "nhầm A với B", "so sánh A với B", "chọn A hơn B"],
  c: 1
},
{
  q: 'The phrase "pay off" is closest in meaning to ______.',
  a: ["gây thất vọng", "đền đáp, mang lại kết quả xứng đáng", "trì hoãn", "nhấn mạnh"],
  c: 1
}
];


// 🔀 RANDOM CÂU + ĐÁP ÁN
let questions = shuffle(originalQuestions.map(q=>{
  let opts = q.a.map((t,i)=>({t,correct:i===q.c}));
  opts = shuffle(opts);
  return {
    q:q.q,
    a:opts.map(o=>o.t),
    c:opts.findIndex(o=>o.correct)
  };
}));

// render
const quizDiv=document.getElementById("quiz");

questions.forEach((q,i)=>{
  let div=document.createElement("div");
  div.className="question";

  let html=`<b>${i+1}. ${q.q}</b>`;

  q.a.forEach((ans,idx)=>{
    html+=`
    <div class="answers">
      <label>
        <input type="radio" name="q${i}" value="${idx}">
        ${String.fromCharCode(65+idx)}. ${ans}
      </label>
    </div>`;
  });

  div.innerHTML=html;
  quizDiv.appendChild(div);
});

// ⏱ timer
let time=900;
let timer=setInterval(()=>{
  let m=Math.floor(time/60);
  let s=time%60;
  document.getElementById("timer").innerText=`⏳ ${m}:${s<10?"0"+s:s}`;
  time--;
  if(time<0){clearInterval(timer);submitQuiz();}
},1000);

// submit
function submitQuiz(){
  let name=document.getElementById("username").value.trim();
  if(!name){alert("Nhập tên!");return;}
let hasEmpty = false;

// kiểm tra câu chưa làm
questions.forEach((q,i)=>{
  let selected=document.querySelector(`input[name=q${i}]:checked`);
  let div=document.getElementsByClassName("question")[i];

  div.classList.remove("unanswered");

  if(!selected){
    div.classList.add("unanswered");
    hasEmpty = true;
  }
});

if(hasEmpty){
  alert("❌ Bạn phải làm hết câu trước khi nộp!");
  return;
}
  clearInterval(timer);

  let score=0;
  let wrongList=[];

  questions.forEach((q,i)=>{
    let selected=document.querySelector(`input[name=q${i}]:checked`);
    if(!selected)return;

    let val=parseInt(selected.value);

    if(val===q.c){
      score++;
    } else {
      wrongList.push({
        question:q.q,
        your:String.fromCharCode(65+val)+". "+q.a[val],
        correct:String.fromCharCode(65+q.c)+". "+q.a[q.c]
      });
    }
  });

  // ⭐ TIME
  let now = new Date().toLocaleString();

  // hiển thị
  let wrongRate = wrongList.length / questions.length;

let resultHTML = `
🎉 <b>${name}</b> đúng <b>${score}/${questions.length}</b><br>
⏰ ${now}<br>
⚠️ TabSwitch: ${tabSwitchCount || 0}<br><br>
`;

if(wrongRate < 0.3){

    resultHTML += `
    <h3>📚 Đáp án các câu sai</h3>
    `;

    wrongList.forEach((w,i)=>{
        resultHTML += `
        <div style="
            border:1px solid #ddd;
            padding:10px;
            margin-bottom:10px;
            border-radius:10px;
            background:#fff8e6;
        ">
            <b>Câu ${i+1}</b><br>
            ${w.question}<br><br>

            ❌ Bạn chọn: <span style="color:red">${w.your}</span><br>
            ✅ Đáp án: <span style="color:green">${w.correct}</span>
        </div>
        `;
    });

}else{

    resultHTML += `
    <div style="
        background:#ffeaea;
        padding:15px;
        border-radius:12px;
        color:#c00000;
        font-weight:bold;
    ">
    ❌ Sai trên 30% mà đòi mấy đáp án của mẹ hả cưng?<br>
    Học bài kỹ vô bữa sau mẹ khảo lại!
    </div>
    `;
}

document.getElementById("result").innerHTML = resultHTML;

  // ⭐ GỬI DATA FULL
  fetch("https://script.google.com/macros/s/AKfycbwKGHpjJy1RxNpGRIHdZtQiPfCrh0OSG24DEzQtRB7Ezlr1aki97aZL0JfQiSwkKmYmrg/exec",{
    method:"POST",
    body:JSON.stringify({
      time: now,
      name: name,
      score: score,
      total: questions.length,
      tabSwitch: tabSwitchCount || 0,
      wrong: wrongList.map((w,i)=>
        (i+1)+". "+w.question+
        " | Bạn chọn: "+w.your+
        " | Đúng: "+w.correct
      ).join("\n")
    })
  });
}

</script>

</body>
</html>
