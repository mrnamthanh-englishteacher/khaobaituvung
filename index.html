<body oncontextmenu="return false;">

<div class="container">

<h1>✨ KHẢO BÀI TỪ VỰNG UNIT 2 (YOU'RE COOKED 😈) ✨</h1>

<input id="username" placeholder="Nhập tên của bạn...">

<script>
let tabSwitchCount = 0; 

document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    tabSwitchCount++;

    alert("⚠️ Bạn đã rời tab (" + tabSwitchCount + " lần)");

    if(tabSwitchCount >= 3){
      alert("❌ Bạn rời tab quá nhiều!");
      submitQuiz();
    }
  }
});

// 🔀 random
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// 📚 DATA
let originalQuestions = [

  a: ["distort", "imitate", "strengthen", "appreciate"],

  a: ["emulate", "customize", "identify", "present"],

},

  q: "The company offered a generous bonus as an ______ for employees to work harder.",

  a: ["results in her", "sets her apart", "results from her", "takes over her"],
  c: 1
},
{
  q: "Many English words are ______ Latin.",

},

  a: ["identify", "reflect", "encourage", "strengthen"],

},

  a: ["a wealth of", "a reflection of", "a respect for", "an identity of"],

},
{
  q: "Emma couldn't ______ the two twins because they looked almost identical.",
  a: ["represent", "differentiate between", "undergo", "specialize in"],

},

  q: "Although he rarely smiles, his face becomes very ______ whenever he talks about his children.",
  a: ["expressionless", "expressive", "believable", "reflective"],
  c: 1
},
{
  q: "Professor Wilson is a ______ scientist whose research has received international recognition.",
  a: ["distinguished", "respectful", "inexperienced", "original"],
  c: 0
}
];


// 🔀 RANDOM CÂU + ĐÁP ÁN
let questions = shuffle(originalQuestions.map(q=>{
  let opts = q.a.map((t,i)=>({t,correct:i===q.c}));
  opts = shuffle(opts);
  return {
    q:q.q,
    a:opts.map(o=>o.t),
    c:opts.findIndex(o=>o.correct)
  };
}));

// render
const quizDiv=document.getElementById("quiz");

questions.forEach((q,i)=>{
  let div=document.createElement("div");
  div.className="question";

  let html=`${i+1}. ${q.q}`;

  q.a.forEach((ans,idx)=>{
    html+=`
    <div class="answers">
      <label>
        <input type="radio" name="q${i}" value="${idx}">
        ${String.fromCharCode(65+idx)}. ${ans}
      </label>
    </div>`;
  });

  div.innerHTML=html;
  quizDiv.appendChild(div);
});

// ⏱ timer
let time=1500;
let timer=setInterval(()=>{
  let m=Math.floor(time/60);
  let s=time%60;
  document.getElementById("timer").innerText=`⏳ ${m}:${s<10?"0"+s:s}`;
  time--;
  if(time<0){clearInterval(timer);submitQuiz();}
},1000);

// submit
function submitQuiz(){
  let name=document.getElementById("username").value.trim();
  if(!name){alert("Nhập tên!");return;}
let hasEmpty = false;

// kiểm tra câu chưa làm
questions.forEach((q,i)=>{
  let selected=document.querySelector(`input[name=q${i}]:checked`);
  let div=document.getElementsByClassName("question")[i];

  div.classList.remove("unanswered");

  if(!selected){
    div.classList.add("unanswered");
    hasEmpty = true;
  }
});

if(hasEmpty){
  alert("❌ Bạn phải làm hết câu trước khi nộp!");
  return;
}
  clearInterval(timer);

  let score=0;
  let wrongList=[];

  questions.forEach((q,i)=>{
    let selected=document.querySelector(`input[name=q${i}]:checked`);
    if(!selected)return;

    let val=parseInt(selected.value);

    if(val===q.c){
      score++;
    } else {
      wrongList.push({
        question:q.q,
        your:String.fromCharCode(65+val)+". "+q.a[val],
        correct:String.fromCharCode(65+q.c)+". "+q.a[q.c]
      });
    }
  });

  // ⭐ TIME
  let now = new Date().toLocaleString();

  // hiển thị
  let wrongRate = wrongList.length / questions.length;

let resultHTML = `
🎉 <b>${name}</b> đúng <b>${score}/${questions.length}</b><br>
⏰ ${now}<br>
⚠️ TabSwitch: ${tabSwitchCount || 0}<br><br>
`;

if(wrongRate < 0.3){

    resultHTML += `
    <h3>📚 Đáp án các câu sai</h3>
    `;

    wrongList.forEach((w,i)=>{
        resultHTML += `
        <div style="
            border:1px solid #ddd;
            padding:10px;
            margin-bottom:10px;
            border-radius:10px;
            background:#fff8e6;
        ">
            <b>Câu ${i+1}</b><br>
            ${w.question}<br><br>

            ❌ Bạn chọn: <span style="color:red">${w.your}</span><br>
            ✅ Đáp án: <span style="color:green">${w.correct}</span>
        </div>
        `;
    });

}else{

    resultHTML += `
    <div style="
        background:#ffeaea;
        padding:15px;
        border-radius:12px;
        color:#c00000;
        font-weight:bold;
    ">
    ❌ Sai trên 30% mà đòi mấy đáp án của mẹ hả cưng?<br>
    Học bài kỹ vô bữa sau mẹ khảo lại!
    </div>
    `;
}

document.getElementById("result").innerHTML = resultHTML;

  // ⭐ GỬI DATA FULL
  fetch("https://script.google.com/macros/s/AKfycbwKGHpjJy1RxNpGRIHdZtQiPfCrh0OSG24DEzQtRB7Ezlr1aki97aZL0JfQiSwkKmYmrg/exec",{
    method:"POST",
    body:JSON.stringify({
      time: now,
      name: name,
      score: score,
      total: questions.length,
      tabSwitch: tabSwitchCount || 0,
      wrong: wrongList.map((w,i)=>
        (i+1)+". "+w.question+
        " | Bạn chọn: "+w.your+
        " | Đúng: "+w.correct
      ).join("\n")
    })
  });
}

</script>
